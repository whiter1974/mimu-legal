<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mimu — Legal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap');
  :root{
    --bg:#0C0D0F; --bg2:#121416; --teal:#27D6B0; --cream:#FFFBF5; --sub:#9AA0A6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:radial-gradient(circle at 15% 10%, var(--bg2), var(--bg) 60%);
    color:var(--cream); font-family:'Inter',-apple-system,'Hiragino Sans',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{ max-width:480px; width:100%; text-align:center; }
  .mark{ display:flex; justify-content:center; gap:6px; margin-bottom:28px; }
  .bar{ width:12px; border-radius:6px; background:var(--teal); }
  h1{ font-family:'Poppins',sans-serif; font-weight:700; font-size:40px; margin:0 0 8px; letter-spacing:-0.02em; }
  p.tagline{ color:var(--sub); margin:0 0 40px; font-size:15px; }
  .links{ display:flex; flex-direction:column; gap:12px; }
  a.linkbtn{
    display:block; padding:16px 20px; border-radius:12px; border:1px solid #23262b;
    background:#15171a; color:var(--cream); text-decoration:none; font-weight:600; font-size:15px;
    transition:border-color .15s ease, transform .15s ease;
  }
  a.linkbtn:hover{ border-color:var(--teal); transform:translateY(-1px); }
  a.linkbtn span{ display:block; font-weight:400; color:var(--sub); font-size:13px; margin-top:4px; }
  footer{ margin-top:40px; color:#5A5F66; font-size:12px; }
</style>
</head>
<body>
  <div class="card">
    <div class="mark">
      <div class="bar" style="height:24px;"></div>
      <div class="bar" style="height:48px;"></div>
      <div class="bar" style="height:18px;"></div>
      <div class="bar" style="height:48px;"></div>
      <div class="bar" style="height:24px;"></div>
    </div>
    <h1>mimu</h1>
    <p class="tagline">Practice. Recorded. / 録って、聴いて、繰り返す。</p>
    <div class="links">
      <a class="linkbtn" href="privacy-ja.html">プライバシーポリシー(日本語)<span>Privacy Policy — Japanese</span></a>
      <a class="linkbtn" href="privacy-en.html">Privacy Policy (English)<span>プライバシーポリシー — 英語版</span></a>
    </div>
    <footer>© 2026 Mimu</footer>
  </div>
</body>
</html>
